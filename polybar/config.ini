[colors]
background = #DD282A2E
background-alt = #DD282A2E
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/screen1]
monitor = ${env:MONITOR:}
width = 100%
height = 24pt
radius = 0.0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 0pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = monospace;2

modules-left = xworkspaces
; modules-right = battery1 battery2 memory temperature cpu date
modules-center = date
modules-right = backlight wlan battery1 battery2

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/temperature]
type = internal/temperature

interval = 0.5
format-prefix = "TEA "
format-prefix-foreground = ${colors.primary}
thermal-zone = 0
zone-type = x86_pkg_temp
hwmon-path = /sys/devices/virtual/thermal/thermal_zone0/temp
base-temperature = 20
warn-temperature = 60

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
; label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
; label-connected = %{F#F0C674}%ifname%%{F-} %essid%
label-connected = %essid%

[module/battery1]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 100
poll-interval = 5

format-charging-prefix = "INT "
format-charging-prefix-foreground = ${colors.primary}
format-discharging-prefix = "INT "
format-discharging-prefix-foreground = ${colors.primary}
format-full-prefix = "INT "
format-full-prefix-foreground = ${colors.primary}
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = FULL

[module/battery2]
type = internal/battery
battery = BAT1
adapter = AC
full-at = 100
poll-interval = 5

format-charging-prefix = "EXT "
format-charging-prefix-foreground = ${colors.primary}
format-discharging-prefix = "EXT "
format-discharging-prefix-foreground = ${colors.primary}
format-full-prefix = "EXT "
format-full-prefix-foreground = ${colors.primary}
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = FULL

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true

poll-interval = 0
scroll-interval = 10

format = <label>
format-prefix = "BRI "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[settings]
screenchange-reload = true
pseudo-transparency = true
